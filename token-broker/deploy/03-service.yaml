# Token Broker Service (in-cluster).
#
# Consumed by AuthBridge and the Backend at:
#   http://token-broker.kagenti-system.svc.cluster.local:8190
---
apiVersion: v1
kind: Service
metadata:
  name: token-broker
  namespace: kagenti-system
  labels:
    app: token-broker
spec:
  type: ClusterIP
  selector:
    app: token-broker
  ports:
    - name: http
      port: 8190
      targetPort: http
      protocol: TCP
