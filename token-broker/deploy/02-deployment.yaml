# Token Broker Deployment.
#
# Stateless service that brokers OAuth flows and caches tokens in memory.
# Placeholders to set per environment:
#   - image:                 the tag your build script produces
#   - OAUTH_CALLBACK_URL:     the externally-reachable URL routed by 04-httproute.yaml;
#                             its host MUST match the HTTPRoute hostname.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-broker
  namespace: kagenti-system
  labels:
    app: token-broker
spec:
  replicas: 1 # In-memory sessions/token cache: do NOT scale >1 without shared state.
  selector:
    matchLabels:
      app: token-broker
  template:
    metadata:
      labels:
        app: token-broker
      annotations:
        # Broker terminates its own OAuth flows; no mesh sidecar required.
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: token-broker
      securityContext:
        runAsNonRoot: true
      containers:
        - name: token-broker
          image: localhost/token-broker:latest # REPLACE with the tag your build script produces.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8190
              protocol: TCP
          env:
            - name: TOKEN_BROKER_PORT
              value: "8190"
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth-credentials
                  key: client-id
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth-credentials
                  key: client-secret
            # Externally-reachable callback URL; host must match the HTTPRoute hostname.
            - name: OAUTH_CALLBACK_URL
              value: "http://token-broker.localtest.me:8080/oauth/callback"
            # Permitted hostnames for backend_session_redirect_url.
            # Comma-separated. Set to the hostname(s) of your backend UI.
            - name: ALLOWED_REDIRECT_HOSTS
              value: "app-demo.localtest.me"
            # JWT validation (required for production — leave unset for dev/test only).
            # JWT_JWKS_URL: JWKS endpoint of your identity provider.
            # JWT_ISSUER:   Expected issuer claim in incoming JWTs.
            # JWT_AUDIENCE: Comma-separated expected audience(s).
            # - name: JWT_JWKS_URL
            #   value: "https://keycloak.example.com/realms/kagenti/protocol/openid-connect/certs"
            # - name: JWT_ISSUER
            #   value: "https://keycloak.example.com/realms/kagenti"
            # - name: JWT_AUDIENCE
            #   value: "token-broker"
            # Optional tunables (defaults in cmd/token-broker/main.go):
            # - name: TOKEN_BROKER_SESSION_TIMEOUT
            #   value: "60s"
            # - name: TOKEN_BROKER_MAX_SESSIONS_PER_USER
            #   value: "5"
            # - name: TOKEN_BROKER_TOKEN_WAIT_TIMEOUT
            #   value: "300s"
            # Optional: skip OAuth discovery by configuring endpoints directly.
            # - name: OAUTH_AUTHORIZATION_ENDPOINT
            #   value: "https://github.com/login/oauth/authorize"
            # - name: OAUTH_TOKEN_ENDPOINT
            #   value: "https://github.com/login/oauth/access_token"
            # - name: OAUTH_SCOPES_SUPPORTED
            #   value: "repo,read:org,read:user"
            # Per-server OAuth config (scopes + endpoint overrides). JSON format.
            # Each key is the resource server URL (must match X-Server-Url exactly).
            # Fields: scopes ([]string), authorization_endpoint (string), token_endpoint (string).
            - name: RESOURCE_CONFIG
              value: >-
                {
                  "http://mcp-server-service.kagenti-demo.svc.cluster.local:8184": {"scopes": ["read:user", "user:email"]}
                }
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
