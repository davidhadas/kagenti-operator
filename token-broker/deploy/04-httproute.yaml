# HTTPRoute exposing the Token Broker OAuth callback through the shared gateway.
#
# The OAuth provider (e.g. GitHub) redirects the user's browser to
# OAUTH_CALLBACK_URL after authorization. That URL must resolve to GET
# /oauth/callback on the broker — otherwise the redirect 404s and the broker
# waits for a callback that never arrives.
#
# This route lives in kagenti-system (same namespace as the Service AND the
# gateway), so:
#   - the parentRef is local (gateway "http" in kagenti-system), and
#   - the backendRef is same-namespace, so NO ReferenceGrant is needed.
#
# The kagenti-system namespace carries the label shared-gateway-access: "true",
# which the "http" gateway's listener selects — same as the working app-demo route.
#
# The hostname MUST match the host in the Deployment's OAUTH_CALLBACK_URL.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: token-broker-oauth-callback
  namespace: kagenti-system
  labels:
    app: token-broker
spec:
  parentRefs:
    - name: http
      namespace: kagenti-system
  hostnames:
    - "token-broker.localtest.me"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth/callback
      backendRefs:
        - name: token-broker
          port: 8190
