# OAuth client credentials for the Token Broker.
#
# DO NOT commit real values. This is a TEMPLATE — copy it, fill in the GitHub
# (or other provider) OAuth app credentials, and apply it separately, or wire
# these keys to an external secret store (e.g. ExternalSecrets / Vault).
#
# Create directly without committing a file:
#   kubectl create secret generic github-oauth-credentials -n kagenti-system \
#     --from-literal=client-id=<CLIENT_ID> \
#     --from-literal=client-secret=<CLIENT_SECRET>
---
apiVersion: v1
kind: Secret
metadata:
  name: github-oauth-credentials
  namespace: kagenti-system
  labels:
    app: token-broker
type: Opaque
stringData:
  client-id: "REPLACE_WITH_OAUTH_CLIENT_ID"
  client-secret: "REPLACE_WITH_OAUTH_CLIENT_SECRET"
